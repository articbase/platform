global:
  scrape_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]
  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
