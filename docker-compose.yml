services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: sqlite:////app/data/oltp.db
      OTEL_SERVICE_NAME: python-oltp-app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.130.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.8.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4319:4318"

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-alerts.yml:/etc/prometheus/alerts/prometheus-alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
      - otel-collector
      - loki

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  loki:
    image: grafana/loki:3.5.3
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki.yaml:/etc/loki/config.yaml:ro
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.5.3
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./observability/promtail.yaml:/etc/promtail/config.yaml:ro
      - ./logs:/var/log/app:ro
    depends_on:
      - app
      - loki

  grafana:
    image: grafana/grafana:12.0.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - alertmanager
      - loki
      - promtail
      - prometheus
      - tempo
